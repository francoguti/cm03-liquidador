<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CM03 — Liquidador Convenio Multilateral</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root {
  --bg:#f5f4f0;--sur:#fff;--s2:#f0efe9;--s3:#e6e4dc;
  --brd:#dedad0;--brd2:#c8c4b8;
  --ink:#1a1916;--ink2:#68655a;--ink3:#a09d92;
  --grn:#1a5c35;--grn-l:#e8f4ed;--grn-m:#237a47;
  --amb:#8a4e09;--amb-l:#fdf2e3;
  --red:#a83030;--red-l:#fdf0f0;
  --blu:#1a3f8a;--blu-l:#eef2fc;
  --mono:'DM Mono',monospace;--sans:'DM Sans',sans-serif;
  --r:6px;--rl:10px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--bg);color:var(--ink);font-size:14px;line-height:1.5;min-height:100vh}
.app{display:grid;grid-template-columns:260px 1fr;min-height:100vh}

/* sidebar */
.sb{background:var(--sur);border-right:1px solid var(--brd);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto}
.sb-logo{padding:18px 16px 14px;border-bottom:1px solid var(--brd)}
.sb-logo .name{font-family:var(--mono);font-size:14px;font-weight:500;color:var(--grn)}
.sb-logo .sub{font-size:11px;color:var(--ink3);margin-top:1px}
.sb-sec{padding:10px 8px 4px}
.sb-lbl{font-size:10px;font-weight:600;letter-spacing:.1em;color:var(--ink3);padding:0 8px;margin-bottom:4px;text-transform:uppercase}
.sb-sep{height:1px;background:var(--brd);margin:4px 0}
.cl-btn{width:100%;text-align:left;background:none;border:none;padding:7px 10px;border-radius:var(--r);cursor:pointer;font-family:var(--sans);font-size:13px;color:var(--ink2);transition:background .1s;display:flex;justify-content:space-between;align-items:center}
.cl-btn:hover{background:var(--s2);color:var(--ink)}
.cl-btn.on{background:var(--grn-l);color:var(--grn);font-weight:500}
.cl-btn .cuit{font-family:var(--mono);font-size:10px;opacity:.6}
.add-cl{margin:6px 8px 0;width:calc(100% - 16px);padding:6px 10px;background:none;border:1.5px dashed var(--brd2);border-radius:var(--r);color:var(--ink3);font-family:var(--sans);font-size:12px;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .1s}
.add-cl:hover{border-color:var(--grn);color:var(--grn)}
.prof-item{padding:8px 10px;border-radius:var(--r);cursor:pointer;transition:background .1s;margin-bottom:2px}
.prof-item:hover{background:var(--s2)}
.prof-item-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:2px}
.prof-item-title{font-size:12px;font-weight:500;color:var(--ink)}
.prof-item-sub{font-size:11px;color:var(--ink3);line-height:1.5}
.prof-badge{font-size:10px;font-family:var(--mono);padding:1px 6px;border-radius:10px}
.prof-badge.ok{background:var(--grn-l);color:var(--grn)}
.prof-badge.warn{background:var(--amb-l);color:var(--amb)}
.prof-badge.neu{background:var(--s3);color:var(--ink2)}

/* main */
.main{padding:28px 36px;min-width:0}
.topbar{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;padding-bottom:18px;border-bottom:1px solid var(--brd);gap:16px}
.topbar h1{font-size:19px;font-weight:600;letter-spacing:-.02em}
.topbar .meta{font-family:var(--mono);font-size:11px;color:var(--ink2);margin-top:2px}
.btn-row{display:flex;gap:7px;flex-wrap:wrap;flex-shrink:0}

/* buttons */
.btn{padding:6px 13px;border-radius:var(--r);font-family:var(--sans);font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--brd2);background:var(--sur);color:var(--ink);transition:all .1s;display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
.btn:hover{background:var(--s2)}
.btn-p{background:var(--grn);color:#fff;border-color:var(--grn)}
.btn-p:hover{background:var(--grn-m);border-color:var(--grn-m)}
.btn-g{background:none;border-color:transparent;color:var(--ink2)}
.btn-g:hover{background:var(--s2);color:var(--ink);border-color:var(--brd)}
.btn-sm{padding:4px 10px;font-size:12px}
.btn-danger{color:var(--red);border-color:transparent;background:none}
.btn-danger:hover{background:var(--red-l);border-color:var(--red)}

/* period bar */
.period-bar{display:flex;align-items:center;gap:10px;padding:8px 14px;background:var(--sur);border:1px solid var(--brd);border-radius:var(--rl);margin-bottom:18px}
.period-bar label{font-size:12px;color:var(--ink2)}
select{background:var(--s2);border:1px solid var(--brd);color:var(--ink);padding:4px 9px;border-radius:var(--r);font-family:var(--sans);font-size:13px;cursor:pointer;outline:none}
select:focus{border-color:var(--grn)}

/* alerts */
.alert{padding:9px 13px;border-radius:var(--r);font-size:13px;margin-bottom:14px;display:flex;align-items:flex-start;gap:8px;line-height:1.5}
.al-w{background:var(--amb-l);border:1px solid #f0c070;color:var(--amb)}
.al-g{background:var(--grn-l);border:1px solid #a3d4b5;color:var(--grn)}
.al-b{background:var(--blu-l);border:1px solid #b5c8ef;color:var(--blu)}

/* section header */
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
.sec-title{font-size:11px;font-weight:600;color:var(--ink2);text-transform:uppercase;letter-spacing:.09em;display:flex;align-items:center;gap:7px}
.sec-title::before{content:'';display:block;width:3px;height:12px;background:var(--grn);border-radius:2px}

/* summary cards 1x4 */
.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.card{background:var(--sur);border:1px solid var(--brd);border-radius:var(--rl);padding:13px 15px}
.card-favor{border-color:#a3d4b5;background:var(--grn-l)}
.card-pagar{border-color:#f0c070;background:var(--amb-l)}
.card-lbl{font-size:10px;font-weight:600;letter-spacing:.08em;color:var(--ink3);text-transform:uppercase;margin-bottom:5px}
.card-val{font-family:var(--mono);font-size:17px;font-weight:500;color:var(--ink)}
.card-sub{font-size:11px;color:var(--ink3);margin-top:2px}

/* datos del período */
.datos-card{background:var(--sur);border:1px solid var(--brd);border-radius:var(--rl);overflow:hidden;margin-bottom:18px}
.datos-card-title{padding:9px 15px;background:var(--s2);border-bottom:1px solid var(--brd);font-size:11px;font-weight:600;color:var(--ink2);text-transform:uppercase;letter-spacing:.08em;display:flex;justify-content:space-between;align-items:center}
.upload-tabs{display:flex;border-bottom:1px solid var(--brd)}
.utab{padding:8px 16px;background:none;border:none;font-family:var(--sans);font-size:13px;color:var(--ink2);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .1s}
.utab:hover{color:var(--ink)}
.utab.on{color:var(--grn);border-bottom-color:var(--grn);font-weight:500}
.tab-pane{padding:14px}
.upload-zone{border:2px dashed var(--brd2);border-radius:var(--rl);padding:28px 20px;text-align:center;cursor:pointer;transition:all .15s;background:var(--sur)}
.upload-zone:hover,.upload-zone.drag{border-color:var(--grn);background:var(--grn-l)}
.upload-zone input{display:none}
.upl-title{font-size:14px;font-weight:500;margin-bottom:5px}
.upl-sub{font-size:12px;color:var(--ink2)}
.upl-fmt{font-size:11px;color:var(--ink3);margin-top:6px;font-family:var(--mono)}
.import-ok{background:var(--grn-l);border:1px solid #a3d4b5;border-radius:var(--r);padding:10px 14px;font-size:13px;color:var(--grn);display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}

/* PV section */
.pv-wrap{border:1px solid var(--brd);border-radius:var(--r);overflow:hidden}
.pv-hdr{padding:7px 12px;background:var(--s2);border-bottom:1px solid var(--brd);font-size:11px;font-weight:600;color:var(--ink2);text-transform:uppercase;letter-spacing:.07em;display:flex;justify-content:space-between;align-items:center}
.pv-row{display:grid;grid-template-columns:100px 1fr 160px 60px;align-items:center;gap:12px;padding:7px 12px;border-bottom:1px solid var(--brd);font-size:13px}
.pv-row:last-child{border-bottom:none}
.pv-row:hover{background:var(--s2)}

/* jurisdiction summary */
.juris-sum{background:var(--sur);border:1px solid var(--brd);border-radius:var(--rl);overflow:hidden;margin-bottom:20px}
.jsrow{display:grid;grid-template-columns:180px 1fr 1fr 1fr 1fr 1fr 1fr;border-bottom:1px solid var(--brd)}
.jsrow:last-child{border-bottom:none}
.jsrow.head .jsc{background:var(--s2);font-size:10px;font-weight:600;color:var(--ink3);text-transform:uppercase;letter-spacing:.07em;padding:7px 10px}
.jsrow.tot{background:var(--s3)}
.jsc{padding:9px 10px;font-size:12px;font-family:var(--mono);border-right:1px solid var(--brd);text-align:right}
.jsc:last-child{border-right:none}
.jsc.lft{text-align:left;font-family:var(--sans)}
.jsc.grn{color:var(--grn);font-weight:500}
.jsc.amb{color:var(--amb);font-weight:500}
.jsc.dim{color:var(--ink3)}
.jur-cod{font-size:10px;font-family:var(--mono);background:var(--s3);padding:1px 5px;border-radius:3px;color:var(--ink2);margin-right:5px}
.jur-nm{font-size:12px;font-weight:500}

/* detail table */
.tbl-wrap{background:var(--sur);border:1px solid var(--brd);border-radius:var(--rl);overflow:hidden;margin-bottom:20px}
table{width:100%;border-collapse:collapse}
thead th{background:var(--s2);padding:7px 10px;text-align:left;font-size:10px;font-weight:600;color:var(--ink3);text-transform:uppercase;letter-spacing:.08em;border-bottom:1px solid var(--brd);white-space:nowrap}
thead th.r{text-align:right}
thead th:first-child{padding-left:14px}
tbody tr{border-bottom:1px solid var(--brd)}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:var(--s2)}
tbody td{padding:7px 10px;font-size:13px;vertical-align:middle}
tbody td:first-child{padding-left:14px}
.mn{font-family:var(--mono);font-size:12px;text-align:right}
.mn-g{font-family:var(--mono);font-size:12px;font-weight:500;color:var(--grn);text-align:right}
.naiib{font-family:var(--mono);font-size:11px;background:var(--s3);padding:1px 6px;border-radius:3px;color:var(--ink2);margin-right:5px}
.pill{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:500}
.art2{background:var(--blu-l);color:var(--blu)}
.art14{background:#fff3e0;color:#7a4200}
.t-inp{background:var(--s2);border:1px solid var(--brd);color:var(--ink);font-family:var(--mono);font-size:12px;padding:3px 7px;border-radius:var(--r);text-align:right;outline:none;transition:border .1s}
.t-inp:focus{border-color:var(--grn);background:var(--grn-l)}
.t-inp.edited{border-color:var(--amb)}
.t-inp[readonly]{opacity:.5;pointer-events:none}
.jt-row{background:var(--s2)}
.jt-row td{font-family:var(--mono);font-size:12px;font-weight:600;padding:7px 10px;border-top:2px solid var(--brd2)}
.jt-row td:first-child{padding-left:14px;font-family:var(--sans);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--ink2)}
tfoot td{padding:8px 10px;background:var(--s3);border-top:1px solid var(--brd2);font-family:var(--mono);font-size:12px;font-weight:500;text-align:right}
tfoot td:first-child{padding-left:14px;font-family:var(--sans);font-size:11px;font-weight:600;text-align:left;color:var(--ink2)}

/* export bar */
.export-bar{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;background:var(--sur);border:1px solid var(--brd);border-radius:var(--rl);margin-top:6px}
.export-lbl{font-size:12px;color:var(--ink2)}

/* modal */
.backdrop{position:fixed;inset:0;background:rgba(0,0,0,.38);display:flex;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(2px)}
.modal{background:var(--sur);border:1px solid var(--brd2);border-radius:12px;padding:24px 28px;width:920px;max-width:97vw;max-height:92vh;overflow-y:auto}
.modal h2{font-size:15px;font-weight:600;margin-bottom:16px;letter-spacing:-.02em}
.fg{margin-bottom:13px}
.fg label{display:block;font-size:12px;color:var(--ink2);margin-bottom:4px}
.fi{width:100%;background:var(--s2);border:1px solid var(--brd);color:var(--ink);padding:7px 10px;border-radius:var(--r);font-family:var(--sans);font-size:13px;outline:none;transition:border .1s}
.fi:focus{border-color:var(--grn)}
.f2{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.cb-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;padding:8px;background:var(--s2);border:1px solid var(--brd);border-radius:var(--r);max-height:190px;overflow-y:auto}
.cb-item{display:flex;align-items:center;gap:5px;padding:5px 7px;border-radius:4px;cursor:pointer;font-size:12px;transition:background .1s}
.cb-item:hover{background:var(--s3)}
.cb-item input{accent-color:var(--grn);width:13px;height:13px;cursor:pointer}
.modal-foot{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;padding-top:14px;border-top:1px solid var(--brd)}
.mtbl{width:100%;border-collapse:collapse}
.mtbl th{font-size:10px;font-weight:600;color:var(--ink3);padding:5px 9px;text-align:left;border-bottom:1px solid var(--brd);background:var(--s2);text-transform:uppercase;letter-spacing:.07em}
.mtbl td{padding:7px 9px;border-bottom:1px solid var(--brd);font-size:13px}
.mtbl tr:last-child td{border-bottom:none}
.coef-ok{color:var(--grn);font-family:var(--mono);font-size:14px;font-weight:600}
.coef-bad{color:var(--red);font-family:var(--mono);font-size:14px;font-weight:600}

/* empty */
.empty{text-align:center;padding:60px 20px}
.empty h2{font-size:17px;font-weight:500;color:var(--ink2);margin-bottom:8px}
.empty p{font-size:13px;color:var(--ink3);line-height:1.7;margin-bottom:22px}

/* toast */
.toast{position:fixed;bottom:20px;right:20px;background:var(--ink);color:#fff;padding:10px 16px;border-radius:var(--rl);font-size:13px;z-index:999;display:flex;align-items:center;gap:8px;box-shadow:0 4px 20px rgba(0,0,0,.2)}


/* ─ Login screen ─ */
.login-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9999}
.login-card{background:var(--sur);border:1px solid var(--brd2);border-radius:16px;padding:40px 44px;width:380px;text-align:center;box-shadow:0 4px 32px rgba(0,0,0,.08)}
.login-logo{font-family:var(--mono);font-size:22px;font-weight:500;color:var(--grn);margin-bottom:6px}
.login-sub{font-size:13px;color:var(--ink3);margin-bottom:28px}
.login-label{display:block;text-align:left;font-size:12px;color:var(--ink2);margin-bottom:6px}
.login-input{width:100%;background:var(--s2);border:1.5px solid var(--brd);color:var(--ink);padding:10px 13px;border-radius:var(--r);font-family:var(--sans);font-size:14px;outline:none;transition:border .15s;margin-bottom:14px;text-align:center;letter-spacing:.15em}
.login-input:focus{border-color:var(--grn)}
.login-btn{width:100%;padding:10px;background:var(--grn);color:#fff;border:none;border-radius:var(--r);font-family:var(--sans);font-size:14px;font-weight:500;cursor:pointer;transition:background .15s}
.login-btn:hover{background:var(--grn-m)}
.login-error{font-size:12px;color:var(--red);margin-top:10px;min-height:18px}
.login-version{font-size:10px;color:var(--ink3);margin-top:20px;font-family:var(--mono)}

/* scrollbar */
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--brd2);border-radius:10px}
</style>
</head>
<body>
<div class="login-screen" id="login-screen">
  <div class="login-card">
    <div class="login-logo">CM03</div>
    <div class="login-sub">Liquidador Convenio Multilateral</div>
    <label class="login-label">Contraseña de acceso</label>
    <input class="login-input" type="password" id="login-pwd" placeholder="••••••••"
      onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">Ingresar</button>
    <div class="login-error" id="login-err"></div>
    <div class="login-version">Beta v10 &mdash; acceso restringido</div>
  </div>
</div>
<div class="app" id="main-app" style="display:none">
  <aside class="sb" id="sb"></aside>
  <main class="main" id="ct"></main>
</div>
<div class="toast" id="toast" style="display:none"></div>

<script>

// ─── Login ────────────────────────────────────────────────────────────────────
// Access key (btoa encoded). To change: btoa('newpassword') in browser console.
var ACCESS_KEY = 'Y29uZG9y'; // = btoa('condor')
var SESSION_KEY = 'cm03_auth';

function doLogin(){
  var pwd = document.getElementById('login-pwd').value;
  if (btoa(pwd) === ACCESS_KEY) {
    sessionStorage.setItem(SESSION_KEY, '1');
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('main-app').style.display = '';
    document.getElementById('login-pwd').value = '';
  } else {
    var err = document.getElementById('login-err');
    err.textContent = 'Contraseña incorrecta';
    document.getElementById('login-pwd').value = '';
    document.getElementById('login-pwd').focus();
    setTimeout(function(){ err.textContent=''; }, 3000);
  }
}

function checkAuth(){
  if (sessionStorage.getItem(SESSION_KEY) === '1') {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('main-app').style.display = '';
  }
}

// ─── Constants ────────────────────────────────────────────────────────────────
const PROV = [
  {c:'CABA',n:'C.A.B.A.',cod:'901'},{c:'BA',n:'Buenos Aires',cod:'902'},
  {c:'CA',n:'Catamarca',cod:'903'},{c:'CO',n:'Córdoba',cod:'904'},
  {c:'CR',n:'Corrientes',cod:'905'},{c:'CH',n:'Chaco',cod:'906'},
  {c:'CU',n:'Chubut',cod:'907'},{c:'ER',n:'Entre Ríos',cod:'908'},
  {c:'FO',n:'Formosa',cod:'909'},{c:'JY',n:'Jujuy',cod:'910'},
  {c:'LP',n:'La Pampa',cod:'911'},{c:'LR',n:'La Rioja',cod:'912'},
  {c:'MZ',n:'Mendoza',cod:'913'},{c:'MI',n:'Misiones',cod:'914'},
  {c:'NQ',n:'Neuquén',cod:'915'},{c:'RN',n:'Río Negro',cod:'916'},
  {c:'SA',n:'Salta',cod:'917'},{c:'SJ',n:'San Juan',cod:'918'},
  {c:'SL',n:'San Luis',cod:'919'},{c:'SC',n:'Santa Cruz',cod:'920'},
  {c:'SF',n:'Santa Fe',cod:'921'},{c:'SE',n:'Sgo. del Estero',cod:'922'},
  {c:'TF',n:'T. del Fuego',cod:'923'},{c:'TU',n:'Tucumán',cod:'924'}
];
const MESES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio',
               'Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const LSKEY = 'cm03_v11';

// Regímenes del Convenio Multilateral
var REGIMENES = [
  {val:'2',  label:'Art. 2 — Régimen General',          directa:false},
  {val:'6',  label:'Art. 6 — Construcción',              directa:true},
  {val:'7',  label:'Art. 7 — Entidades financieras',     directa:true},
  {val:'8',  label:'Art. 8 — Transporte interjurisd.',   directa:true},
  {val:'9',  label:'Art. 9 — Seguros',                   directa:true},
  {val:'10', label:'Art. 10 — Profes. liberales',        directa:true},
  {val:'11', label:'Art. 11 — Industria',                directa:true},
  {val:'12', label:'Art. 12 — Agropecuario',             directa:true},
  {val:'13', label:'Art. 13 — Loteos y subdivisiones',   directa:true},
  {val:'14', label:'Art. 14 — Inicio de actividades',    directa:true}
];

// NAES -> AFIP code exceptions (where they differ)
var NAES_TO_AFIP = {
  '012591':'012590','012599':'012590','012601':'012600','012609':'012600',
  '091001':'091000','091002':'091000','091003':'091000','091009':'091000',
  '192001':'192000','192002':'192000','201191':'201190','201199':'201190',
  '329091':'329090','329099':'329090','352021':'352020','352022':'352020',
  '451111':'451110','451112':'451110','451191':'451190','451192':'451190',
  '451211':'451210','451212':'451210','451291':'451290','451292':'451290',
  '462111':'462110','462112':'462110','466111':'466110','466112':'466110',
  '466119':'466110','466122':'466129','466123':'466129',

// ─── Calculation ─────────────────────────────────────────────────────────────
function getSAFForPeriod(client, jCode, periodKey){
  var p = client.periodos && client.periodos[periodKey];
  if (!p) return 0;
  // Manual override
  if (p.saf[jCode] !== undefined && p.saf[jCode] !== '') return parseFloat(p.saf[jCode])||0;
  // Auto from previous period
  var parts = periodKey.split('-');
  var py = parseInt(parts[0]), pm = parseInt(parts[1]) - 1;
  if (pm === 0) { pm = 12; py--; }
  var prevKey = py + '-' + (pm<10?'0':'') + pm;
  var prev = client.periodos && client.periodos[prevKey];
  if (!prev) return 0;
  // Use frozen SAF if previous period is closed
  if (prev.closed && prev.safFrozen && prev.safFrozen[jCode] !== undefined) {
    return prev.safFrozen[jCode];
  }
  // Otherwise recalculate
  var r = calcResult(client, jCode, prevKey);
  return r.aFavorContrib > 0.005 ? r.aFavorContrib : 0;
}

function getBaseAct(bd, coef, regimen){
  // Manual override wins
  if (bd.manual !== undefined && bd.manual !== '') return parseFloat(bd.manual)||0;
  var importado    = parseFloat(bd.importado)||0;
  var ajustePrevio = parseFloat(bd.ajustePrevio)||0;
  var ajuste       = parseFloat(bd.ajuste)||0;
  var basePreCoef  = importado + ajustePrevio;
  // Art.2: apply coeficiente. All others (Art.6-14): direct assignment
  var isDirecta = regimen !== '2';
  var base = isDirecta ? basePreCoef : basePreCoef * coef;
  return base + ajuste;
}

// Helper: get regimen string for a jurisdiction
function getRegimen(jInfo){
  if (!jInfo) return '2';
  if (jInfo.regimen) return String(jInfo.regimen);
  if (jInfo.art14) return '14';
  return '2';
}

function calcResult(client, jCode, periodKey){
  var p = client.periodos && client.periodos[periodKey];
  var zero = {base:0,anticipo:0,valSuman:0,valRestan:0,aFavorFisco:0,aFavorContrib:0,ret:0,banc:0,per:0,perAduana:0,saf:0};
  if (!p) return zero;

  var jInfo = (client.jurisdicciones||[]).filter(function(j){ return j.code===jCode; })[0];
  var coef = parseFloat(jInfo&&jInfo.coef)||0;
  var regimen = getRegimen(jInfo);
  var isDirecta = regimen !== '2';

  var base = 0, anticipo = 0;
  (client.actividades||[]).forEach(function(act){
    var key = act.id + '_' + jCode;
    var bd = p.bases[key]||{};
    var b = getBaseAct(bd, coef, regimen);
    var alic = parseFloat((p.alicuotas&&p.alicuotas[key]) || act.defaultAlic || 0);
    base += b;
    anticipo += b * alic / 100;
  });

  var ret = parseFloat(p.ret&&p.ret[jCode])||0;
  var banc = parseFloat(p.banc&&p.banc[jCode])||0;
  var per = parseFloat(p.per&&p.per[jCode])||0;
  var perA = parseFloat(p.perAduana&&p.perAduana[jCode])||0;
  var saf = getSAFForPeriod(client, jCode, periodKey);
  var valRestan = ret + banc + per + perA + saf;
  var neto = anticipo - valRestan;

  return {
    base: Math.round(base*100)/100,
    anticipo: Math.round(anticipo*100)/100,
    valSuman: 0,
    valRestan: Math.round(valRestan*100)/100,
    aFavorFisco: neto > 0.005 ? Math.round(neto*100)/100 : 0,
    aFavorContrib: neto < -0.005 ? Math.round(-neto*100)/100 : 0,
    ret:ret, banc:banc, per:per, perAduana:perA, saf:saf
  };
}

      jBase += baseAct; jAnticipo += ant;

      var hasManual = bd.manual !== undefined && bd.manual !== '';

      var rInfo=REGIMENES.filter(function(r){return r.val===regJ;})[0]; h += '<td><span class="pill '+(regJ==='2'?'art2':'art14')+'">Art.'+regJ+'</span></td>';
      // Base importada (readonly display) — before coef
      h += '<td class="mn" style="color:var(--ink3)">$'+fmt(imp)+'</td>';

      // Ajuste — applied after coef, must sum to zero across jurisdictions
      var hasAdj = bd.ajuste !== undefined && bd.ajuste !== '' && parseFloat(bd.ajuste) !== 0;

      // Base imponible — calculated auto, can be manually overridden
      h += '<td style="text-align:right">';
      h += '<input class="t-inp'+(hasManual?' edited':'')+'" style="width:110px" type="number" step="0.01"';
      h += ' value="'+(hasManual?bd.manual:Math.round(baseAct*100)/100)+'"';
      if (isClosed) h += ' readonly';
      h += ' data-act="'+act.id+'" data-jc="'+j.code+'" data-field="manual"';
      h += ' title="'+(hasManual?'Editado manualmente. Borr&aacute; para volver al c&aacute;lculo autom&aacute;tico.':'Calculado autom&aacute;ticamente: base &times; coef + ajuste.')+'"';
      h += ' onblur="setField(this)"></td>';

      // Alícuota
      h += '<td style="text-align:right">';
      h += '<input class="t-inp" style="width:68px" type="number" step="0.001" min="0" max="30"';
      h += ' value="'+((p.alicuotas&&p.alicuotas[key])||act.defaultAlic||'')+'" placeholder="0.000"';
      if (isClosed) h += ' readonly';
      h += ' data-act="'+act.id+'" data-jc="'+j.code+'" data-field="alic"';
      h += ' onblur="setField(this)"></td>';

      h += '<td class="mn-g">$'+fmt(ant)+'</td>';
      h += '</tr>';
    });

    // Juris total row
    var r = results[j.code];
    var saldoStr = r.aFavorContrib>0.005?'SAF $'+fmt(r.aFavorContrib):r.aFavorFisco>0.005?'$'+fmt(r.aFavorFisco):'$0,00';
    var saldoColor = r.aFavorContrib>0.005?'var(--grn)':r.aFavorFisco>0.005?'var(--amb)':'var(--ink3)';
    h += '<tr class="jt-row"><td colspan="5">Total '+esc(pv2.n)+'</td>';
    h += '<td class="mn">$'+fmt(jBase)+'</td><td></td>';
    h += '<td style="text-align:right;color:'+saldoColor+'">'+saldoStr+'</td></tr>';
  });

  h += '</tbody></table>';

  // Ajuste validation: per activity, sum of ajustes across all jurisdictions must be zero
  var ajusteWarnings = [];
  acts.forEach(function(act){
    var sumAdj = 0;
    juris.forEach(function(j){
      var key = act.id+'_'+j.code;
      var bd = p.bases[key]||{};
      sumAdj += parseFloat(bd.ajuste)||0;
    });
    if (Math.abs(sumAdj) > 0.005) {
      ajusteWarnings.push(esc(act.nombre)+': ajustes suman $'+fmt(sumAdj)+' (deber&iacute;a ser $0,00)');

    h += '<div style="padding:8px 14px;background:var(--amb-l);border-top:1px solid #f0c070;font-size:12px;color:var(--amb);display:flex;align-items:center;gap:8px">';

    h += '<div style="padding:8px 14px;background:var(--grn-l);border-top:1px solid #a3d4b5;font-size:12px;color:var(--grn);display:flex;align-items:center;gap:8px">';
    h += '<span>&#10003;</span><span>Ajustes balanceados &mdash; la base imponible total no cambia</span></div>';
  }
  h += '</div>';

  h += '<div class="export-bar"><div class="export-lbl">'+esc(c.razon)+' &middot; CUIT '+esc(c.cuit)+' &middot; '+MESES[S.mes-1]+' '+S.anio+'</div>';

  document.getElementById('ct').innerHTML = h;
}

// ─── Field editing (no re-render on input) ───────────────────────────────────
function setField(el){
  var c = getCl(); if (!c) return;
  var p = getPeriod(c);
  var actId = el.getAttribute('data-act');
  var jCode = el.getAttribute('data-jc');
  var field = el.getAttribute('data-field');
  var val = el.value.trim();
  var key = actId+'_'+jCode;
  if (!p.bases[key]) p.bases[key] = {};
  if (!p.alicuotas) p.alicuotas = {};

  if (field === 'ajustePrevio') {
    // Pre-coef adjustment: stored per activity, propagated to all jurisdictions
    if (!p.ajustePrevio) p.ajustePrevio = {};
    var v2 = val === '' ? 0 : parseFloat(val)||0;
    p.ajustePrevio[actId] = v2;
    // Propagate to all jurisdictions for this activity
    var jurisAll = (getCl().jurisdicciones||[]);
    jurisAll.forEach(function(j2){
      var k2 = actId+'_'+j2.code;
      if (!p.bases[k2]) p.bases[k2] = {};
      p.bases[k2].ajustePrevio = v2;
    });
    if (val === '') { el.classList.remove('edited'); } else { el.classList.add('edited'); }
  } else if (field === 'ajustePrevio') {
    if (!p.ajustePrevio) p.ajustePrevio = {};
    var v2 = (val === '') ? 0 : parseFloat(val)||0;
    p.ajustePrevio[actId] = v2;
    // Propagate to all jurisdictions for this activity
    (getCl().jurisdicciones||[]).forEach(function(j2){
      var k2 = actId+'_'+j2.code;
      if (!p.bases[k2]) p.bases[k2] = {};
      p.bases[k2].ajustePrevio = v2;
    });
    if (val === '') { el.classList.remove('edited'); } else { el.classList.add('edited'); }
  } else if (field === 'alic') {
    p.alicuotas[key] = parseFloat(val)||0;
  } else if (field === 'ajuste') {
    if (val === '' || parseFloat(val) === 0) {
      delete p.bases[key].ajuste;
      el.classList.remove('edited');
    } else {
      p.bases[key].ajuste = parseFloat(val)||0;
      el.classList.add('edited');
    }
  } else if (field === 'manual') {
    var num = parseFloat(val);
    if (!isNaN(num)) { p.bases[key].manual = num; el.classList.add('edited'); }
    else { delete p.bases[key].manual; el.classList.remove('edited'); }
  }
  save();
  // Update only the anticipo cell without full re-render
  updateAnticipo(c, p, actId, jCode);
  updateSummaryCards(c);
}

function cancelCloseModal(){ var el=document.getElementById('close-confirm'); if(el) el.remove(); }
function cancelReopenModal(){ var el=document.getElementById('reopen-confirm'); if(el) el.remove(); }
function confirmClose(){
  var el=document.getElementById('close-confirm'); if(el) el.remove();
  var c=getCl(); if(!c) return;
  var k=pKey();
  if (!c.periodos[k]) c.periodos[k]={pvTotales:{},bases:{},alicuotas:{},ret:{},banc:{},per:{},perAduana:{},saf:{},closed:false,safFrozen:{}};
  var p=c.periodos[k];
  p.closed=true;
  p.closedAt=new Date().toISOString();
  if(!p.safFrozen) p.safFrozen={};
  (c.jurisdicciones||[]).forEach(function(j){
    var r=calcResult(c,j.code,k);
    p.safFrozen[j.code]=r.aFavorContrib>0.005?r.aFavorContrib:0;
  });
  save(); render();
  toast('Periodo cerrado. SAF congelado para el mes siguiente.');
}

function confirmReopen(){
  var el=document.getElementById('reopen-confirm'); if(el) el.remove();
  var c=getCl(); if(!c) return;
  var k=pKey();
  if (c.periodos&&c.periodos[k]){
    c.periodos[k].closed=false;
    delete c.periodos[k].closedAt;
    delete c.periodos[k].safFrozen;
  }
  save(); render();
  toast('Periodo reabierto.');
}

function crearCl(){
  var razon=(document.getElementById('nc-razon')||{}).value||'';
  var cuit=(document.getElementById('nc-cuit')||{}).value||'';
  razon=razon.trim(); cuit=cuit.trim();
  if (!razon||!cuit){ toast('Completá razón social y CUIT'); return; }
  var juris=Array.from(document.querySelectorAll('.jck:checked')).map(function(x){ return x.value; });
  if (!juris.length){ toast('Seleccioná al menos una jurisdicción'); return; }
  var actEls=document.querySelectorAll('#acts-list > div');
  var actividades=[], pvMap={};
  actEls.forEach(function(el,i){
    var naiib=(el.querySelector('.act-naiib')||{}).value||''; naiib=naiib.trim();
    var nom=(el.querySelector('.act-nom')||{}).value||''; nom=nom.trim();
    var pvStr=(el.querySelector('.act-pvs')||{}).value||''; pvStr=pvStr.trim();
    if (!nom) return;
    var id='act_'+(i+1);
    actividades.push({id:id,naiib:naiib,nombre:nom,defaultAlic:''});
    pvStr.split(',').map(function(s){ return s.trim(); }).filter(Boolean).forEach(function(pv){
      pvMap[String(parseInt(pv)||pv)]=id;

function applyManualVentas(){
  var c=getCl(); if(!c) return;
  var p=getPeriod(c);
  var acts=c.actividades||[];
  var jurisAll=c.jurisdicciones||[];
  var pvMap=c.pvMap||{};
  var loaded=0;

  // Act totals from inputs
  var actTotals={};
  acts.forEach(function(act){
    var el=document.getElementById('mamt-'+act.id);
    if(el&&el.value.trim()!==''){
      actTotals[act.id]=parseFloat(el.value)||0;
      loaded++;
    }
  });

  if(Object.keys(actTotals).length>0){
    // Rebuild pvTotales
    p.pvTotales={};
    acts.forEach(function(act){
      var total=actTotals[act.id]||0;
      // Find PVs for this activity
      var pvs=Object.keys(pvMap).filter(function(pv){ return pvMap[pv]===act.id; });
      if(pvs.length>0){
        p.pvTotales[pvs[0]]=total;
      } else {
        var synKey='syn_'+act.id;
        p.pvTotales[synKey]=total;
        if(!c.pvMap) c.pvMap={};
        c.pvMap[synKey]=act.id;
      }
    });
    // Update bases for Art.2
    jurisAll.filter(function(j){ return !j.art14; }).forEach(function(j){
      acts.forEach(function(act){
        var key=act.id+'_'+j.code;
        if(!p.bases[key]) p.bases[key]={};
        p.bases[key].importado=actTotals[act.id]||0;
        delete p.bases[key].manual;
      });
    });
  }

  // Art.14 direct inputs
  jurisAll.filter(function(j){ return j.art14; }).forEach(function(j){
    acts.forEach(function(act){
      var el=document.getElementById('mamt14-'+act.id+'-'+j.code);
      if(el&&el.value.trim()!==''){
        var key=act.id+'_'+j.code;
        if(!p.bases[key]) p.bases[key]={};
        p.bases[key].manual=parseFloat(el.value)||0;
        loaded++;
      }
    });
  });

  if(loaded===0){ toast('Ingresá al menos un monto'); return; }
  save(); render();
  toast('Ventas cargadas correctamente');
}

// ─── Import ───────────────────────────────────────────────────────────────────
function importDropped(f){ if(f) processFile(f); }
function importFile(input){ if(input.files[0]) processFile(input.files[0]); input.value=''; }

function processFile(file){
  var reader=new FileReader();
  reader.onload=function(e){
    try {
      var wb=XLSX.read(e.target.result,{type:'array',cellDates:true});
      var result=parseVentas(wb);
      if(!result||!Object.keys(result.pvTotales).length){ toast('No se encontraron ventas válidas'); return; }
      var c=getCl(); if(!c) return;
      var p=getPeriod(c);
      p.pvTotales=result.pvTotales;
      p.pvGravado=result.pvGravado||{};
      p.pvExento=result.pvExento||{};
      if(result.mes&&result.anio){ S.mes=result.mes; S.anio=result.anio; }
      var pvMap=c.pvMap||{};
      var actTotals={};
      Object.keys(result.pvTotales).forEach(function(pv){
        var a=pvMap[pv]; if(a) actTotals[a]=(actTotals[a]||0)+result.pvTotales[pv];
      });
      (c.actividades||[]).forEach(function(act){
        (c.jurisdicciones||[]).forEach(function(j){
          var key=act.id+'_'+j.code;
          if(!p.bases[key]) p.bases[key]={};
          p.bases[key].importado=actTotals[act.id]||0;
        });
      });
      if((c.actividades||[]).length===1){
        if(!c.pvMap) c.pvMap={};
        Object.keys(result.pvTotales).forEach(function(pv){ if(!c.pvMap[pv]) c.pvMap[pv]=c.actividades[0].id; });
      }
      save(); render();
      var tot=Object.values(result.pvTotales).reduce(function(s,v){ return s+v; },0);
      toast(Object.keys(result.pvTotales).length+' PVs importados · $'+fmt(tot));
      var unmapped=Object.keys(result.pvTotales).filter(function(pv){ return !c.pvMap[pv]; });
      if(unmapped.length>0) setTimeout(function(){ openM('pvmap'); },400);
    } catch(err){ toast('Error: '+err.message); }
  };
  reader.readAsArrayBuffer(file);
}

// ─── Import parsers ──────────────────────────────────────────────────────────
// AFIP tipo comprobante: NC codes = 3,8,13,53,58,63 → subtract from base
var NC_TIPOS = {3:1,8:1,13:1,53:1,58:1,63:1};

function parsearCSV(text) {
  // Handles semicolon-separated, quoted CSVs from ARCA
  var lines = text.replace(/\r\n/g,'\n').replace(/\r/g,'\n').trim().split('\n');
  return lines.map(function(line){
    // Remove surrounding quotes from each field and split by ";"
    return line.split(';').map(function(f){ return f.replace(/^"|"$/g,'').trim(); });
  });
}

function parseNum(s) {
  // Handle Argentine number format: 1.234,56 → 1234.56
  if (s===undefined||s===null||s==='') return 0;
  var str = String(s).trim().replace(/\./g,'').replace(',','.');
  return parseFloat(str)||0;
}

function parseVentas(wb) {
  // Try to detect format from first sheet
  var pvTotales={}, pvGravado={}, pvExento={}, mes=null, anio=null;

  // Check if it's a real xlsx with meaningful headers (Libro IVA)
  var sheet0 = wb.Sheets[wb.SheetNames[0]];
  var rows = XLSX.utils.sheet_to_json(sheet0,{header:1,defval:'',raw:false});
  if (!rows.length) return {pvTotales:{},mes:null,anio:null};

  var h0 = rows[0].map(function(c){ return String(c).trim(); });

  // ── FORMAT 3: Libro IVA Ventas (XLSX from accounting software) ──
  // Headers: Fecha, Tipo, Comprobante, Cliente, CUIT, Cond. IVA, Neto Gravado 21%, ...
  if (h0.indexOf('Comprobante')>=0 && h0.indexOf('Tipo')>=0 && h0.some(function(h){ return h.includes('Neto Gravado'); })) {
    var colFecha=h0.indexOf('Fecha');
    var colTipo=h0.indexOf('Tipo');
    var colComp=h0.indexOf('Comprobante');
    // Sum all "Neto Gravado X%" columns
    var netoGravCols=[], exentoCols=[];
    h0.forEach(function(h,i){
      if (h.includes('Neto Gravado')&&!h.includes('Total')) netoGravCols.push(i);
      if (h.includes('Exento')||h.includes('No Gravado')) exentoCols.push(i);
    });
    for (var i=1;i<rows.length;i++) {
      var row=rows[i];
      var comp=String(row[colComp]||'').trim();
      var tipo=String(row[colTipo]||'').trim().toLowerCase();
      if (!comp) continue;
      // Extract PV from comprobante string: "B-00003-00000145" → pv=3
      var parts=comp.split('-');
      var pv = parts.length>=2 ? String(parseInt(parts[1])||0) : null;
      if (!pv||pv==='0') continue;
      var neto=0;
      netoGravCols.forEach(function(ci){ neto+=parseNum(row[ci]); });
      var exento=0;
      exentoCols.forEach(function(ci){ exento+=parseNum(row[ci]); });
      // Libro IVA: NC rows already have negative values
      var total = neto + exento;
      pvTotales[pv]=(pvTotales[pv]||0)+total;
      pvGravado[pv]=(pvGravado[pv]||0)+neto;
      pvExento[pv]=(pvExento[pv]||0)+exento;
      if (!mes && row[colFecha]) {
        var d=new Date(row[colFecha]);
        if (!isNaN(d.getTime())){ mes=d.getMonth()+1; anio=d.getFullYear(); }
      }
    }
    return {pvTotales:pvTotales,pvGravado:pvGravado,pvExento:pvExento,mes:mes,anio:anio};
  }

  // ── CSV formats: re-read as raw text ──
  // XLSX.read reads CSV as a sheet - get raw string from first cell of each row
  // Better: detect via column names
  var colPV=-1, colTipo2=-1, colNeto=-1, colExento=-1, colFecha2=-1;

  // FORMAT 1: Mis Comprobantes (latin-1, columns: "Punto de Venta", "Total Neto Gravado", "Importe Exento")
  // FORMAT 2: Portal IVA (utf-8, columns: "Punto de Venta", "Imp. Neto Gravado Total", "Imp. Op. Exentas")
  h0.forEach(function(h,i){
    var hl=h.toLowerCase().replace(/[^a-z0-9. ]/g,'');  // strip accents/encoding noise
    if (hl==='punto de venta') colPV=i;
    if (hl.includes('fecha') && hl.includes('emis')) colFecha2=i;
    if (hl.includes('tipo') && hl.includes('comprobante')) colTipo2=i;
    if (hl==='total neto gravado'||hl==='imp. neto gravado total') colNeto=i;
    if (hl==='importe exento'||hl==='imp. op. exentas') colExento=i;
  });

  if (colPV<0||colNeto<0) return {pvTotales:{},mes:null,anio:null};

  for (var i2=1;i2<rows.length;i2++) {
    var row2=rows[i2];
    var pv2=String(row2[colPV]||'').trim();
    if (!pv2) continue;
    var tipoVal = colTipo2>=0 ? parseInt(row2[colTipo2])||0 : 1;
    var neto2 = parseNum(row2[colNeto]);
    var exento2 = colExento>=0 ? parseNum(row2[colExento]) : 0;
    var total2 = neto2 + exento2;
    // NC types: subtract
    if (NC_TIPOS[tipoVal]) total2 = -total2;
    pvTotales[pv2]=(pvTotales[pv2]||0)+total2;
    pvGravado[pv2]=(pvGravado[pv2]||0)+(NC_TIPOS[tipoVal]?-neto2:neto2);
    pvExento[pv2]=(pvExento[pv2]||0)+(NC_TIPOS[tipoVal]?-exento2:exento2);
    if (!mes) {
      // Try fecha column, or scan first few fields for a date-like value
      var dSrc2 = colFecha2>=0 ? String(row2[colFecha2]||'') : '';
      if (!dSrc2) { for (var di3=0;di3<Math.min(row2.length,5);di3++){ var s3=String(row2[di3]||''); if (s3.match(/\d+[\/-]\d+[\/-]\d+/)){ dSrc2=s3; break; } } }
      if (dSrc2) {
        var dp2=dSrc2.trim();
        var mISO=dp2.match(/^(\d{4})-(\d{2})-(\d{2})/);
        var mSlash=dp2.match(/^(\d{1,2})[\/-](\d{1,2})[\/-](\d{2,4})$/);
        if (mISO){ anio=parseInt(mISO[1]); mes=parseInt(mISO[2]); }
        else if (mSlash){
          var yr3=parseInt(mSlash[3]); if (yr3<100) yr3+=2000;
          // Assume M/D/YY for ARCA Portal IVA
          mes=parseInt(mSlash[1]); anio=yr3;
        }
      }
    }
  }
  // Round all values to 2 decimal places
  Object.keys(pvTotales).forEach(function(pv){
    pvTotales[pv] = Math.round(pvTotales[pv]*100)/100;
  });
  return {pvTotales:pvTotales,pvGravado:pvGravado,pvExento:pvExento,mes:mes,anio:anio};
}

// ─── SIFERE Excel Exporter ───────────────────────────────────────────────────
function doSIFERE(){
  var c=getCl(); if(!c) return;
  var p=getPeriod(c);
  var juris=c.jurisdicciones||[];
  var acts=c.actividades||[];
  var pvMap=c.pvMap||{};
  var pvGrav=p.pvGravado||{};
  var pvExento=p.pvExento||{};

  // Helper to compute per-activity gravado/exento for a jurisdiction
  function getActGravado(actId){
    var tot=0;
    Object.keys(pvMap).forEach(function(pv){ if(pvMap[pv]===actId) tot+=(pvGrav[pv]||0); });
    return Math.max(0,tot);
  }
  function getActExento(actId){
    var tot=0;
    Object.keys(pvMap).forEach(function(pv){ if(pvMap[pv]===actId) tot+=(pvExento[pv]||0); });
    return Math.max(0,tot);
  }
  function getActNoGrav(actId, jCode){
    // No gravados IIBB = ajustePrevio (manual correction before coef)
    var bd=(p.bases&&p.bases[actId+'_'+jCode])||{};
    var ajPrev=parseFloat(bd.ajustePrevio)||0;
    return ajPrev<0?Math.abs(ajPrev):0;
  }

  // Shared data
  var cuitClean=c.cuit.replace(/-/g,'');
  var cuitFormatted=cuitClean.length===11
    ? cuitClean.slice(0,2)+'-'+cuitClean.slice(2,10)+'-'+cuitClean.slice(10)
    : c.cuit;
  var periodoStr=S.anio+'-'+(S.mes<10?'0':'')+S.mes;

  // ── One file per jurisdiction ──
  juris.forEach(function(j){
    var pv2=prov(j.code);
    var regimen=getRegimen(j);
    var isDirecta=regimen!=='2';
    var coef=parseFloat(j.coef)||0;

    // Totals for this jurisdiction
    var totalGravado=0, totalExento=0, totalNoGrav=0;
    acts.forEach(function(act){
      var grav=getActGravado(act.id);
      var exen=getActExento(act.id);
      var noGrav=getActNoGrav(act.id,j.code);
      if(isDirecta){
        totalGravado+=grav; totalExento+=exen; totalNoGrav+=noGrav;
      } else {
        totalGravado+=grav*coef; totalExento+=exen*coef; totalNoGrav+=noGrav*coef;
      }
    });

    // CABECERA sheet
    var cab=XLSX.utils.aoa_to_sheet([
      [],[],
      [null,'CUIT (XX-XXXXXXXX-X): ', cuitFormatted],
      [null,'Período (AAAA-MM):', periodoStr]
    ]);

    // Jurisdiction sheet
    var sheetData=[
      [],[], // rows 1-2 empty
      [null,'Coeficiente Distribución:', isDirecta ? 0 : coef],
      [null,'Artículo 14:', isDirecta ? 'S' : 'N'],
      [],
      [null,'Ingresos Gravados:', Math.round(totalGravado*100)/100],
      [null,'Ingresos No Gravados:', Math.round(totalNoGrav*100)/100],
      [null,'Ingresos Exentos:', Math.round(totalExento*100)/100],
      [],[],
      [null,'Régimen / Artículo','Cód. Actividad',' Tratamiento Fiscal','Base Imponible',' Ajuste ',' Alícuota']
    ];
    acts.forEach(function(act){
      var key=act.id+'_'+j.code;
      var bd=(p.bases&&p.bases[key])||{};
      var baseAct=getBaseAct(bd,coef,regimen);
      var ajuste=parseFloat(bd.ajuste)||0;
      var alic=parseFloat((p.alicuotas&&p.alicuotas[key])||act.defaultAlic||0);
      var naesCode=naesToAfip(act.naiib||'0');
      var regimenNum=regimen==='14'?14:parseInt(regimen)||2;
      sheetData.push([
        null,
        regimenNum,
        parseInt(naesCode)||0,
        0,
        Math.round(baseAct*100)/100,
        Math.round(ajuste*100)/100,
        alic
      ]);
    });

    var ws=XLSX.utils.aoa_to_sheet(sheetData);
    var wb={SheetNames:['CABECERA',pv2.cod], Sheets:{}};
    wb.Sheets['CABECERA']=cab;
    wb.Sheets[pv2.cod]=ws;

    // Filename: CM03_SIFERE_CUIT_PERIODO_COD.xlsx
    var fname='CM03_SIFERE_'+c.cuit.replace(/-/g,'')+'_'+periodoStr+'_'+pv2.cod+'.xlsx';
    XLSX.writeFile(wb,fname);
  });

  toast('✓ '+juris.length+' archivo(s) SIFERE generados — uno por jurisdicción');
}

function doCSV(){
  var c=getCl(); if(!c) return;
  var juris=c.jurisdicciones||[];
  var acts=c.actividades||[];
  var p=getPeriod(c);
  var lines=['CM03 - Liquidación Mensual Convenio Multilateral',
    'Cliente: '+c.razon+' | CUIT: '+c.cuit+' | Período: '+MESES[S.mes-1]+' '+S.anio,'',
    'Jurisdicción;Código;NAIIB;Actividad;Régimen;Base imponible;Alícuota %;Anticipo;Ret.;Banc.;Perc.;Perc.Aduana;SAF;A Favor Fisco;A Favor Contrib.'];
  juris.forEach(function(j){
    var pv2=prov(j.code);
    acts.forEach(function(act){
      var key=act.id+'_'+j.code;
      var bd=p.bases[key]||{};
      var coef=parseFloat(j.coef)||0;
      var base=getBaseAct(bd,coef,j.art14);
      var alic=parseFloat((p.alicuotas&&p.alicuotas[key])||act.defaultAlic||0);
      var r=calcResult(c,j.code,pKey());
      lines.push([pv2.n,pv2.cod,act.naiib||'',act.nombre,j.art14?'Art.14':'Art.2',
        base.toFixed(2).replace('.',','),alic.toString().replace('.',','),
        (base*alic/100).toFixed(2).replace('.',','),
        (parseFloat(p.ret&&p.ret[j.code])||0).toFixed(2).replace('.',','),
        (parseFloat(p.banc&&p.banc[j.code])||0).toFixed(2).replace('.',','),
        (parseFloat(p.per&&p.per[j.code])||0).toFixed(2).replace('.',','),
        (parseFloat(p.perAduana&&p.perAduana[j.code])||0).toFixed(2).replace('.',','),
        r.saf.toFixed(2).replace('.',','),
        r.aFavorFisco.toFixed(2).replace('.',','),
        r.aFavorContrib.toFixed(2).replace('.',',')
      ].join(';'));
    });
  });
  var blob=new Blob(['\uFEFF'+lines.join('\n')],{type:'text/csv;charset=utf-8;'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a'); a.href=url;
  a.download='CM03_'+c.cuit+'_'+S.anio+(S.mes<10?'0':'')+S.mes+'.csv';
  a.click(); URL.revokeObjectURL(url); toast('CSV exportado');
}
